<!DOCTYPE html>
<html lang="es" class="dark">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi BYD Argentina | Calculadora</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Vercel Web Analytics (Estadísticas) -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script src="/_vercel/insights/script.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        neon: {
                            blue: '#00f0ff',
                            purple: '#8a2be2',
                            dark: '#0a0a0f',
                            card: '#13151a'
                        }
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0a0a0f;
            color: #e2e8f0;
            background-image: radial-gradient(circle at top right, rgba(0, 240, 255, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.1), transparent 40%);
        }
        
        /* Modern Slider Styling */
        input[type=range] {
            -webkit-appearance: none; 
            appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #00f0ff;
            cursor: pointer;
            margin-top: -8px; 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            border: 2px solid #fff;
            transition: transform 0.1s;
        }
        
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #2d3748;
            border-radius: 4px;
            border: 1px solid #1a202c;
        }
        
        input[type=range]:focus {
            outline: none;
        }

        .glass-panel {
            background: rgba(19, 21, 26, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="antialiased min-h-screen text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        // Datos actualizados de los vehículos
        const CAR_MODELS = [

            {
                id: 'dolphin-mini-gl',
                name: 'Dolphin Mini GL',
                type: 'EV',
                batteryKw: 30.08,
                maxAc: 6.6,

                electricRange: 300,
                icon: (
                    <svg className="w-10 h-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        {/* Delfín */}
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M19.4 9.6C17.5 7.7 14.5 7 11.5 7.5C8.8 7.9 5.8 9.5 3 11C2.5 11.2 2 12.5 2 12.5C2 12.5 4.5 11.5 7 12C10.5 12.7 14.5 13 19.5 10.5C20.5 10 22 9 22 9C22 9 20.8 11 19.4 9.6Z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M12.5 7.5C12.5 7.5 11 3 8 2C9.5 4.5 13.5 6 13.5 7" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M10 12.3C10 12.3 8 16 10.5 18C11 16 11 14 11 14" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M3 11C3 11 2 7 1 6C2 8.5 2 13 1 16C2 14.5 3 11 3 11Z" />
                        <circle cx="17.5" cy="9.5" r="0.8" fill="currentColor" stroke="none" />
                    </svg>
                )
            },
            {
                id: 'dolphin-mini-gs',
                name: 'Dolphin Mini GS',
                type: 'EV',
                batteryKw: 43.2,
                maxAc: 6.6,
                maxDc: 85,
                electricRange: 400,
                icon: (
                    <svg className="w-10 h-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        {/* Delfín */}
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M19.4 9.6C17.5 7.7 14.5 7 11.5 7.5C8.8 7.9 5.8 9.5 3 11C2.5 11.2 2 12.5 2 12.5C2 12.5 4.5 11.5 7 12C10.5 12.7 14.5 13 19.5 10.5C20.5 10 22 9 22 9C22 9 20.8 11 19.4 9.6Z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M12.5 7.5C12.5 7.5 11 3 8 2C9.5 4.5 13.5 6 13.5 7" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M10 12.3C10 12.3 8 16 10.5 18C11 16 11 14 11 14" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M3 11C3 11 2 7 1 6C2 8.5 2 13 1 16C2 14.5 3 11 3 11Z" />
                        <circle cx="17.5" cy="9.5" r="0.8" fill="currentColor" stroke="none" />
                    </svg>
                )
            },
            {
                id: 'shark',
                name: 'Shark',
                type: 'PHEV',
                batteryKw: 29.58,
                maxAc: 6.6,
                maxDc: 40,
                electricRange: 100,
                icon: (
                    <svg className="w-10 h-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        {/* Tiburón */}
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M22 11C22 11 18 14.5 11 14.5C6 14.5 2 12 2 12C2 12 5 10.5 9 10C13.5 9.4 18.5 10 22 11Z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M12.5 9.8L10 3L15 9" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M10.5 14.5L8.5 20L13.5 15" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M2 12L1 5L3.5 10.5L1 18L2 12Z" />
                        <circle cx="17.5" cy="10.8" r="0.8" fill="currentColor" stroke="none" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M14.5 10.5v2.5M13.5 10.8v2" />
                    </svg>
                )
            },
            {
                id: 'song-pro-gl',
                name: 'Song Pro GL',
                type: 'PHEV',
                batteryKw: 12.9,
                maxAc: 6.6,
                maxDc: 0,
                electricRange: 71,
                icon: (
                    <svg className="w-10 h-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        {/* SUV Jerarquía (Song Pro) */}
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M3 15h18M3 15l-1-4a2 2 0 011-2h2l1.5-4h9.5l3 4h3a2 2 0 012 2l1 4M3 15v2a1 1 0 001 1h2a1 1 0 001-1v-2h10v2a1 1 0 001 1h2a1 1 0 001-1v-2" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M6.5 9h9.5M16 9l2.5 4" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M12 5v8" />
                    </svg>
                )
            },
            {
                id: 'song-pro-gs',
                name: 'Song Pro GS',
                type: 'PHEV',
                batteryKw: 18.3,
                maxAc: 6.6,
                maxDc: 0,
                electricRange: 110,
                icon: (
                    <svg className="w-10 h-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        {/* SUV Jerarquía (Song Pro) */}
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M3 15h18M3 15l-1-4a2 2 0 011-2h2l1.5-4h9.5l3 4h3a2 2 0 012 2l1 4M3 15v2a1 1 0 001 1h2a1 1 0 001-1v-2h10v2a1 1 0 001 1h2a1 1 0 001-1v-2" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M6.5 9h9.5M16 9l2.5 4" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.2} d="M12 5v8" />
                    </svg>
                )
            }
        ];

        const App = () => {
            const [selectedCarId, setSelectedCarId] = React.useState(CAR_MODELS[0].id);
            const [chargerType, setChargerType] = React.useState('AC');
            const [chargerPower, setChargerPower] = React.useState(7); 
            const [currentBattery, setCurrentBattery] = React.useState(0);

            const selectedCar = CAR_MODELS.find(c => c.id === selectedCarId);

            // Evitar que un auto sin DC se quede en modo DC, y ajustar límites si se usa el Wallbox BYD
            React.useEffect(() => {
                if (selectedCar.maxDc === 0 && chargerType === 'DC') {
                    setChargerType('AC');
                    setChargerPower(7);
                }
                if (chargerType === 'BYD' || chargerType === 'AC') {
                    const maxPowerLimit = (selectedCar.id === 'atto-2' || selectedCar.id.startsWith('song-pro')) ? 7 : 22;
                    if (chargerPower > maxPowerLimit) {
                        setChargerPower(maxPowerLimit);
                    }
                }
            }, [selectedCarId, chargerType, selectedCar.maxDc, chargerPower, selectedCar.id]);

            // Handlers
            const handleChargerTypeChange = (type) => {
                if (type === 'DC' && selectedCar.maxDc === 0) return; // Bloquear si no soporta
                setChargerType(type);
                if (type === 'EMERGENCY') {
                    setChargerPower(1.4);
                } else if (type === 'BYD') {
                    const maxBydPower = (selectedCar.id === 'atto-2' || selectedCar.id.startsWith('song-pro')) ? 7 : 22;
                    setChargerPower(maxBydPower);
                } else if (type === 'AC') {
                    const maxAcPower = (selectedCar.id === 'atto-2' || selectedCar.id.startsWith('song-pro')) ? 7 : 22;
                    setChargerPower(maxAcPower);
                } else {
                    setChargerPower(50);
                }
            };

            // Helper para mostrar la potencia con un decimal solo si es necesario
            const formatPower = (num) => {
                return Number(num).toFixed(1).replace('.0', '');
            };

            // Cálculos
            // Porcentaje a cargar = 80% - % actual
            const percentageToCharge = 80 - currentBattery;
            
            // Energía objetivo en kWh a recargar
            const targetEnergyKw = (percentageToCharge / 100) * selectedCar.batteryKw;
            
            // Rango sumado en KM
            const addedRangeKm = Math.round((percentageToCharge / 100) * selectedCar.electricRange);
            
            // Límite del coche
            const maxCarPower = (chargerType === 'AC' || chargerType === 'EMERGENCY' || chargerType === 'BYD') ? selectedCar.maxAc : selectedCar.maxDc;
            const actualChargingPower = Math.min(chargerPower, maxCarPower);

            // Tiempo = Energía / Potencia (Asumiendo un 90% de eficiencia)
            const efficiency = 0.90; 
            const timeInHours = (targetEnergyKw / actualChargingPower) / efficiency;
            
            const hours = Math.floor(timeInHours);
            const minutes = Math.round((timeInHours - hours) * 60);

            // Costos
            const costYPF = targetEnergyKw * 892;
            const costChargeBox = targetEnergyKw * 700;
            const totalMinutesForCost = timeInHours * 60;
            const costShell = totalMinutesForCost * 609;
            const costEPE = targetEnergyKw * 350;
            const costEDELAP = targetEnergyKw * 312;

            const isHomeCharging = chargerType === 'EMERGENCY' || chargerType === 'BYD';

            const formatCurrency = (amount) => {
                return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(amount);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 sm:p-8 min-h-screen flex flex-col justify-center">
                    
                    {/* Header */}
                    <div className="text-center mb-12">
                        <h1 className="text-4xl md:text-6xl font-bold mb-4 tracking-tight">
                            Hi BYD <span className="text-transparent bg-clip-text bg-gradient-to-r from-neon-blue to-blue-500">Argentina</span>
                        </h1>
                        <p className="text-slate-400 text-lg">Calculadora de tiempo de carga para modelos de BYD en Argentina</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        {/* Columna Izquierda: Controles */}
                        <div className="lg:col-span-2 space-y-6">
                            
                            {/* Panel 1: Vehículo */}
                            <div className="glass-panel rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-neon-blue shadow-[0_0_10px_#00f0ff]"></div>
                                <h2 className="text-xl font-semibold mb-6 flex items-center gap-3">
                                    <span className="text-neon-blue font-bold text-2xl">01.</span>
                                    Selecciona el modelo
                                </h2>
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                    {CAR_MODELS.map(car => (
                                        <button 
                                            key={car.id}
                                            onClick={() => setSelectedCarId(car.id)}
                                            className={`flex flex-col items-center justify-center p-4 rounded-2xl transition-all duration-300 border ${
                                                selectedCarId === car.id 
                                                ? 'border-neon-blue bg-neon-blue/10 text-white shadow-[0_0_15px_rgba(0,240,255,0.2)]' 
                                                : 'border-slate-800 bg-slate-900/50 text-slate-400 hover:border-slate-600 hover:bg-slate-800'
                                            }`}
                                        >
                                            <div className={`${selectedCarId === car.id ? 'text-neon-blue' : 'text-slate-500'}`}>
                                                {car.icon}
                                            </div>
                                            <span className="font-semibold text-xs md:text-sm text-center leading-tight">{car.name}</span>
                                            <span className="text-[10px] mt-1 opacity-70">{car.batteryKw} kWh</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Panel 2: Estado de Batería y Cargador */}
                            <div className="glass-panel rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-purple-500 shadow-[0_0_10px_#a855f7]"></div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    {/* Batería Actual */}
                                    <div>
                                        <h2 className="text-xl font-semibold mb-6 flex items-center gap-3">
                                            <span className="text-purple-500 font-bold text-2xl">02.</span>
                                            Batería actual
                                        </h2>
                                        <div className="flex justify-between items-end mb-4">
                                            <label className="text-slate-400 text-sm">Estado de carga inicial</label>
                                            <span className="text-3xl font-bold text-white">{currentBattery}%</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="0"
                                            max="79" 
                                            step="1"
                                            value={currentBattery}
                                            onChange={(e) => setCurrentBattery(Number(e.target.value))}
                                            className="w-full"
                                        />
                                        <div className="flex justify-between text-xs text-slate-500 mt-2">
                                            <span>0% (Vacía)</span>
                                            <span>79%</span>
                                        </div>
                                        
                                        <div className="mt-6 bg-slate-900/80 rounded-xl p-4 border border-slate-800">
                                            <p className="text-sm text-slate-300">
                                                Objetivo de carga fijo al <span className="text-neon-blue font-bold">80%</span>.
                                            </p>
                                            <p className="text-xs text-slate-500 mt-1">Por recomendación para preservar la vida útil de la batería.</p>
                                        </div>
                                    </div>

                                    {/* Configuración de Cargador */}
                                    <div>
                                        <h2 className="text-xl font-semibold mb-6 flex items-center gap-3">
                                            <span className="text-purple-500 font-bold text-2xl">03.</span>
                                            Potencia
                                        </h2>
                                        
                                        <div className="grid grid-cols-2 gap-2 mb-6 bg-slate-900 p-2 rounded-xl border border-slate-800">
                                            <button 
                                                onClick={() => handleChargerTypeChange('EMERGENCY')}
                                                className={`py-2 text-[11px] sm:text-sm rounded-lg font-medium transition-all ${
                                                    chargerType === 'EMERGENCY' 
                                                    ? 'bg-slate-700 text-white shadow-sm' 
                                                    : 'text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                Emergencia
                                            </button>
                                            <button 
                                                onClick={() => handleChargerTypeChange('BYD')}
                                                className={`py-2 text-[11px] sm:text-sm rounded-lg font-medium transition-all ${
                                                    chargerType === 'BYD' 
                                                    ? 'bg-slate-700 text-white shadow-sm' 
                                                    : 'text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                Cargador BYD
                                            </button>
                                            <button 
                                                onClick={() => handleChargerTypeChange('AC')}
                                                className={`py-2 text-[11px] sm:text-sm rounded-lg font-medium transition-all ${
                                                    chargerType === 'AC' 
                                                    ? 'bg-slate-700 text-white shadow-sm' 
                                                    : 'text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                Pública (AC)
                                            </button>
                                            <button 
                                                onClick={() => handleChargerTypeChange('DC')}
                                                disabled={selectedCar.maxDc === 0}
                                                className={`py-2 text-[11px] sm:text-sm rounded-lg font-medium transition-all ${
                                                    chargerType === 'DC' 
                                                    ? 'bg-slate-700 text-white shadow-sm' 
                                                    : selectedCar.maxDc === 0 
                                                        ? 'opacity-30 cursor-not-allowed'
                                                        : 'text-slate-400 hover:text-white'
                                                }`}
                                            >
                                                Pública (DC)
                                            </button>
                                        </div>

                                        {selectedCar.maxDc === 0 && chargerType === 'AC' && (
                                            <p className="text-xs text-orange-400 mb-4 bg-orange-400/10 p-2 rounded border border-orange-400/20">
                                                El {selectedCar.name} solo admite carga en Alterna (AC).
                                            </p>
                                        )}

                                        {chargerType === 'EMERGENCY' && (
                                            <p className="text-xs text-blue-400 mb-4 bg-blue-400/10 p-2 rounded border border-blue-400/20">
                                                Cargador portátil para tomacorriente estándar (1.4 kW).
                                            </p>
                                        )}

                                        {chargerType === 'BYD' && (
                                            <p className="text-xs text-green-400 mb-4 bg-green-400/10 p-2 rounded border border-green-400/20">
                                                Cargador de pared (Wallbox) domiciliario provisto por BYD.
                                            </p>
                                        )}

                                        <div>
                                            <div className="flex justify-between items-end mb-4">
                                                <label className="text-slate-400 text-sm">
                                                    {chargerType === 'EMERGENCY' ? 'Cargador Portátil' : (chargerType === 'BYD' ? 'Wallbox BYD' : 'Surtidor Público')}
                                                </label>
                                                <span className="text-3xl font-bold text-white">{formatPower(chargerPower)} kW</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min={chargerType === 'DC' ? 2 : 1.4} 
                                                max={
                                                    chargerType === 'DC' ? 150 : 
                                                    (chargerType === 'EMERGENCY' ? 1.4 : 
                                                    ((chargerType === 'BYD' || chargerType === 'AC') ? ((selectedCar.id === 'atto-2' || selectedCar.id.startsWith('song-pro')) ? 7 : 22) : 22))
                                                } 
                                                step={chargerType === 'DC' ? 1 : 0.1}
                                                value={chargerPower}
                                                onChange={(e) => setChargerPower(Number(e.target.value))}
                                                disabled={chargerType === 'EMERGENCY'}
                                                className={`w-full ${chargerType === 'EMERGENCY' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                            />
                                            <div className="flex justify-between text-xs text-slate-500 mt-2">
                                                {chargerType === 'EMERGENCY' ? (
                                                    <>
                                                        <span>Fijo</span>
                                                        <span>1.4 kW</span>
                                                    </>
                                                ) : (
                                                    <>
                                                        <span>Min ({chargerType === 'DC' ? '2' : '1.4'} kW)</span>
                                                        <span>Max ({
                                                            chargerType === 'DC' ? '150 kW' : 
                                                            ((chargerType === 'BYD' || chargerType === 'AC') ? ((selectedCar.id === 'atto-2' || selectedCar.id.startsWith('song-pro')) ? '7 kW' : '22 kW') : '22 kW')
                                                        })</span>
                                                    </>
                                                )}
                                            </div>
                                            {chargerType === 'DC' && (
                                                <p className="text-xs text-blue-400 mt-3 p-2 bg-blue-400/10 rounded border border-blue-400/20">
                                                    * Aclaración: En Argentina, la mayoría de los puntos de carga públicos actuales ofrecen hasta 50 kW.
                                                </p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Columna Derecha: Resultados */}
                        <div className="relative group">
                            {/* Efecto de brillo de fondo */}
                            <div className="absolute -inset-1 bg-gradient-to-r from-neon-blue to-purple-600 rounded-[2rem] blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>
                            
                            <div className="relative h-full glass-panel rounded-3xl p-8 flex flex-col items-center justify-between border-t border-l border-white/10">
                                <h3 className="text-slate-400 font-medium tracking-wide uppercase text-sm mb-8">Tiempo Estimado</h3>
                                
                                {/* Círculo Principal de Resultado */}
                                <div className="relative w-48 h-48 md:w-56 md:h-56 rounded-full border-4 border-slate-800 flex flex-col items-center justify-center shadow-[inset_0_0_30px_rgba(0,0,0,0.5)] bg-slate-900/50 mb-8">
                                    <svg className="absolute inset-0 w-full h-full -rotate-90">
                                        <circle 
                                            cx="50%" cy="50%" r="47%" 
                                            fill="none" 
                                            stroke="#00f0ff" 
                                            strokeWidth="4" 
                                            strokeDasharray={`${(percentageToCharge/100) * 295} 295`} 
                                            className="transition-all duration-1000 ease-out drop-shadow-[0_0_8px_#00f0ff]"
                                        />
                                    </svg>
                                    <div className="text-4xl md:text-5xl font-bold text-white z-10 text-center">
                                        {hours > 0 && <span className="block">{hours}<span className="text-2xl font-light text-slate-400 ml-1">h</span></span>}
                                        <span className="block mt-1">{minutes}<span className="text-2xl font-light text-slate-400 ml-1">m</span></span>
                                    </div>
                                </div>

                                <div className="w-full space-y-4">
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800">
                                        <span className="text-slate-400 text-sm">Tramo calculado</span>
                                        <span className="font-semibold text-neon-blue">{currentBattery}% → 80%</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800">
                                        <span className="text-slate-400 text-sm">Energía a cargar</span>
                                        <span className="font-semibold">{targetEnergyKw.toFixed(1)} kWh</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800">
                                        <span className="text-slate-400 text-sm flex items-center gap-1">Autonomía sumada <span className="text-[10px] text-slate-500">(teórica)</span></span>
                                        <span className="font-bold text-green-400">~{addedRangeKm} km *</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800">
                                        <span className="text-slate-400 text-sm">Límite del vehículo</span>
                                        <span className="font-semibold">{maxCarPower} kW</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2">
                                        <span className="text-slate-400 text-sm">Potencia efectiva</span>
                                        <span className={`font-bold text-lg ${actualChargingPower < chargerPower ? 'text-orange-400' : 'text-green-400'}`}>
                                            {formatPower(actualChargingPower)} kW
                                        </span>
                                    </div>

                                    {chargerPower > maxCarPower && (
                                        <div className="mt-4 text-[11px] leading-relaxed text-orange-200/80 bg-orange-500/10 p-3 rounded-xl border border-orange-500/20">
                                            <span className="text-orange-400 mr-1">⚠️ Limitación:</span>
                                            Aunque tu cargador da {formatPower(chargerPower)}kW, el {selectedCar.name} asimila como máximo {maxCarPower}kW en {chargerType}.
                                        </div>
                                    )}

                                    <p className="text-[10px] text-slate-500 mt-3 leading-tight border-t border-slate-800/50 pt-2">
                                        * <strong className="text-slate-400">Importante:</strong> Estimación teórica basada en homologación. La autonomía real requiere verificación en uso y varía drásticamente según el clima, velocidad, uso del aire acondicionado y estilo de manejo.
                                    </p>
                                </div>

                                {/* Sección de Costos */}
                                <div className="w-full mt-6 pt-6 border-t border-white/10">
                                    <h3 className="text-slate-400 font-medium tracking-wide uppercase text-sm mb-4">Costo Estimado</h3>
                                    
                                    <div className="space-y-3">
                                        {/* EPE Santa Fe */}
                                        <div className={`flex justify-between items-center p-3 rounded-xl bg-slate-900/60 border border-slate-800/80 transition-colors ${!isHomeCharging ? 'opacity-40' : 'hover:border-slate-700'}`}>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                                <span className={`text-slate-300 text-sm ${!isHomeCharging ? 'line-through' : ''}`}>EPE Santa Fe <span className="text-[10px] text-slate-500 ml-1">($350/kWh)</span></span>
                                            </div>
                                            <span className={`font-semibold ${isHomeCharging ? 'text-white' : 'text-slate-500'}`}>{isHomeCharging ? formatCurrency(costEPE) : 'N/A'}</span>
                                        </div>
                                        
                                        {/* EDELAP */}
                                        <div className={`flex justify-between items-center p-3 rounded-xl bg-slate-900/60 border border-slate-800/80 transition-colors ${!isHomeCharging ? 'opacity-40' : 'hover:border-slate-700'}`}>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-cyan-400"></div>
                                                <span className={`text-slate-300 text-sm ${!isHomeCharging ? 'line-through' : ''}`}>EDELAP <span className="text-[10px] text-slate-500 ml-1">($312/kWh)</span></span>
                                            </div>
                                            <span className={`font-semibold ${isHomeCharging ? 'text-white' : 'text-slate-500'}`}>{isHomeCharging ? formatCurrency(costEDELAP) : 'N/A'}</span>
                                        </div>

                                        {/* YPF */}
                                        <div className={`flex justify-between items-center p-3 rounded-xl bg-slate-900/60 border border-slate-800/80 transition-colors ${isHomeCharging ? 'opacity-40' : 'hover:border-slate-700'}`}>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-[#00f0ff]"></div>
                                                <span className={`text-slate-300 text-sm ${isHomeCharging ? 'line-through' : ''}`}>YPF <span className="text-[10px] text-slate-500 ml-1">($892/kWh)</span></span>
                                            </div>
                                            <span className={`font-semibold ${!isHomeCharging ? 'text-white' : 'text-slate-500'}`}>{!isHomeCharging ? formatCurrency(costYPF) : 'N/A'}</span>
                                        </div>

                                        {/* ChargeBox */}
                                        <div className={`flex justify-between items-center p-3 rounded-xl bg-slate-900/60 border border-slate-800/80 transition-colors ${isHomeCharging ? 'opacity-40' : 'hover:border-slate-700'}`}>
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-green-400"></div>
                                                <span className={`text-slate-300 text-sm ${isHomeCharging ? 'line-through' : ''}`}>ChargeBox <span className="text-[10px] text-slate-500 ml-1">($700/kWh)</span></span>
                                            </div>
                                            <span className={`font-semibold ${!isHomeCharging ? 'text-white' : 'text-slate-500'}`}>{!isHomeCharging ? formatCurrency(costChargeBox) : 'N/A'}</span>
                                        </div>

                                        {/* Shell */}
                                        {(!isHomeCharging && selectedCar.id !== 'atto-2' && !selectedCar.id.startsWith('song-pro')) ? (
                                            <div className="flex justify-between items-center p-3 rounded-xl bg-slate-900/60 border border-slate-800/80 hover:border-slate-700 transition-colors">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-2 h-2 rounded-full bg-yellow-400"></div>
                                                    <span className="text-slate-300 text-sm">Shell <span className="text-[10px] text-slate-500 ml-1">($609/min)</span></span>
                                                </div>
                                                <span className="font-semibold text-white">{formatCurrency(costShell)}</span>
                                            </div>
                                        ) : (
                                            <div className="flex justify-between items-center p-3 rounded-xl bg-slate-900/60 border border-slate-800/80 opacity-40">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-2 h-2 rounded-full bg-yellow-400"></div>
                                                    <span className={`text-slate-300 text-sm line-through`}>Shell</span>
                                                    <span className="text-[10px] text-slate-400 ml-1">(No disponible)</span>
                                                </div>
                                                <span className="font-semibold text-slate-500">N/A</span>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* Aviso sobre tarifa por minuto en cargas lentas */}
                                    {(!isHomeCharging && chargerType !== 'DC') && (
                                        <p className="text-[10px] text-slate-500 mt-3 leading-tight">
                                            * Nota: La tarifa por minuto de Shell puede resultar extremadamente costosa en cargas de Alterna (AC). Suele recomendarse exclusivamente en cargadores rápidos (DC).
                                        </p>
                                    )}
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Footer / Redes Sociales */}
                    <div className="mt-12 flex flex-col items-center justify-center pb-8 opacity-80 hover:opacity-100 transition-opacity">
                        <p className="text-slate-400 text-sm font-medium tracking-widest uppercase mb-4">¡Seguinos en nuestras redes!</p>
                        <div className="flex gap-4">
                            {/* Instagram */}
                            <a href="#" target="_blank" rel="noopener noreferrer" className="glass-panel p-3 rounded-full hover:bg-gradient-to-r hover:from-purple-600/20 hover:to-pink-600/20 border-slate-800 hover:border-pink-500 transition-all duration-300 text-slate-400 hover:text-pink-400 shadow-[0_0_0_transparent] hover:shadow-[0_0_15px_rgba(236,72,153,0.3)] hover:-translate-y-1" title="Síguenos en Instagram">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                                </svg>
                            </a>
                            
                            {/* TikTok */}
                            <a href="#" target="_blank" rel="noopener noreferrer" className="glass-panel p-3 rounded-full hover:bg-gradient-to-r hover:from-neon-blue/20 hover:to-blue-500/20 border-slate-800 hover:border-neon-blue transition-all duration-300 text-slate-400 hover:text-neon-blue shadow-[0_0_0_transparent] hover:shadow-[0_0_15px_rgba(0,240,255,0.3)] hover:-translate-y-1" title="Síguenos en TikTok">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                                </svg>
                            </a>
                        </div>

                        {/* Firma Personal de Fede Pascale */}
                        <div className="mt-8 pt-6 border-t border-slate-800/50 w-full max-w-sm flex flex-col sm:flex-row items-center justify-center gap-3">
                            <span className="text-slate-500 text-xs tracking-wide">
                                Desarrollado por <strong className="text-slate-300 font-semibold">Fede Pascale</strong>
                            </span>
                            <a 
                                href="https://wa.me/543416761115?text=Hola%20Fede%20!" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="flex items-center gap-2 glass-panel px-4 py-2 rounded-full hover:bg-gradient-to-r hover:from-[#25D366]/20 hover:to-[#25D366]/10 border-slate-800 hover:border-[#25D366] transition-all duration-300 text-slate-400 hover:text-[#25D366] shadow-[0_0_0_transparent] hover:shadow-[0_0_15px_rgba(37,211,102,0.3)] hover:-translate-y-1"
                                title="Contactar a Fede por WhatsApp"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                                </svg>
                                <span className="text-xs font-bold tracking-wide">Contacto</span>
                            </a>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
